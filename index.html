<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Logger's Landing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik+Dirt&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    font-family: Arial, sans-serif;
    background: #f4efe8;
    color: #2f241b;
    text-align: center;
    padding: 24px;
  }
  .logo-wrap {
    position: relative;
    display: inline-block;
    overflow: hidden;
  }
  .logo-wrap::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    left: -60%;
    width: 40%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
    animation: glint 1.8s ease-in-out 0.4s 1 forwards;
    transform: skewX(-15deg);
  }
  @keyframes glint {
    0%   { left: -60%; }
    100% { left: 130%; }
  }
  .logo {
    font-family: 'Rubik Dirt', cursive;
    font-size: 3.5rem;
    letter-spacing: 1px;
    color: #2f241b;
    display: block;
  }
  p {
    margin-top: 0.75rem;
    font-size: 1.1rem;
    color: #6b5442;
  }
</style>
</head>
<body>
  <main>
    <div class="logo-wrap">
      <h1 class="logo">Loggers Landing</h1>
    </div>
    <p>Riverfront retreat on the South Fork Skykomish River.</p>
  </main>
</body>
</html>
